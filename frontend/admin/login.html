<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Admin Login - Hotelier</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Toastr -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Heebo', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background: linear-gradient(135deg, #f3b33d 0%, #e67e22 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }
        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .login-header p {
            opacity: 0.9;
            margin: 0;
        }
        .login-body {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #333;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #f3b33d;
            box-shadow: 0 0 0 0.2rem rgba(243, 179, 61, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #f3b33d 0%, #e67e22 100%);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            color: white;
            transition: transform 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
        }
        .back-to-site {
            text-align: center;
            margin-top: 20px;
        }
        .back-to-site a {
            color: #f3b33d;
            text-decoration: none;
        }
        .back-to-site a:hover {
            text-decoration: underline;
        }
        .admin-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-hotel fa-3x mb-3"></i>
            <h1>Admin Portal</h1>
            <p>Hotelier Management System</p>
            <span class="admin-badge"><i class="fas fa-shield-alt"></i> Secure Access</span>
        </div>
        <div class="login-body">
            <form id="adminLoginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope me-2"></i>Email Address</label>
                    <input type="email" class="form-control" id="adminEmail" placeholder="admin@hotelier.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock me-2"></i>Password</label>
                    <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                </button>
            </form>
            <div class="back-to-site">
                <a href="../index.html"><i class="fas fa-arrow-left me-1"></i>Back to Website</a>
            </div>
            <hr class="my-4">
            <div class="text-center text-muted small">
                <p class="mb-0">Demo Credentials:</p>
                <p class="mb-0">Email: admin@hotelier.com<br>Password: admin123</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    
    <script>
        toastr.options = {
            closeButton: true,
            progressBar: true,
            positionClass: 'toast-top-right',
            timeOut: 3000
        };
        
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            // Demo admin credentials
            if (email === 'admin@hotelier.com' && password === 'admin123') {
                // Store admin session
                localStorage.setItem('adminToken', 'admin_demo_token_123');
                localStorage.setItem('adminUser', JSON.stringify({
                    name: 'Admin User',
                    email: 'admin@hotelier.com',
                    role: 'super_admin'
                }));
                
                toastr.success('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                toastr.error('Invalid email or password');
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
